name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate plugin structure
        run: node scripts/validate-plugin-structure.js

      - name: Validate config (CI mode)
        run: node scripts/validate-config.js --ci

      - name: Test PII guard
        run: node scripts/test-pii-guard.js
