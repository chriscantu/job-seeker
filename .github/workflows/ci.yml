name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate plugin structure
        run: bun scripts/validate-plugin-structure.ts

      - name: Validate config (CI mode)
        run: bun scripts/validate-config.ts --ci

      - name: Validate STRUCTURE.md
        run: bun scripts/validate-structure.ts

      - name: Test PII guard
        run: bun scripts/test-pii-guard.ts

      - name: Validate markdown links
        run: bun scripts/validate-links.ts

      - name: Run tests
        run: bun test
